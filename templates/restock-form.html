<section class="windows-content standard-form">

    <section class="standard-form scrollable" data-application-part="form">
        <fieldset>

            <legend>{{this.sheet}}</legend>
              
            <div class="form-group">
                <label>{{localize "VENDOR-RESTOCK.rolltable"}}</label>
                <div class="form-fields">
                    <select id="tableList" name="tableList" class="list" style="width: 100%;">
                        {{selectOptions this.tables selected=flags.table valueAttr="key" labelAttr="label"}}
                    </select>
                </div>
                <p class="hint">{{localize "VENDOR-RESTOCK.sheet-notes"}}</p>
            </div>

            <div class="form-group">
                <label>{{localize "VENDOR-RESTOCK.rollformula"}}</label>
                <div class="form-fields">
                    <input id="rollformula" name="rollformula" value="{{flags.formula}}" placeholder="1d4" style="width: 100%;" />
                </div>
                <p class="hint">{{localize "VENDOR-RESTOCK.rollformula-notes"}}</p>
            </div>

            <div class="form-group">
                <label>{{localize "VENDOR-RESTOCK.vendorclear"}}</label>
                <div class="form-fields">
                    <input type="checkbox" id="clearvendor" name="clearvendor" {{#if flags.clear}}checked{{/if}} style="margin: 0; width: 18px; height: 18px; cursor: pointer;" />   
                </div>
                <p class="hint">{{localize "VENDOR-RESTOCK.vendorclear-notes"}}</p>
            </div>
        </fieldset> 
    </section>

    {{!-- Adaptive Submission Footer Button --}}
    <footer class="form-footer" data-application-part="footer">
        <button id="vendor-restock-submit" type="button" data-action="submitRestock" >
            <i class="fas fa-boxes-packing"></i> {{localize "VENDOR-RESTOCK.submit"}}
        </button>
    </footer>
</section>
